name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Linting Tools & Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio

    - name: Run Ruff Linter
      run: ruff check .

    - name: Run Ruff Formatter Check
      run: ruff format --check .

    - name: Run Test Suite
      run: |
        # Run tests for previous days if pytest is configured
        # Or execute our day-09 testing script as a sanity check
        python day-09/day9_testing.py
