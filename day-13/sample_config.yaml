# ============================================================
# Sample Agent Configuration — YAML Format
# ============================================================
# This file demonstrates how to configure an AI agent
# using structured YAML. Load with: yaml.safe_load(open(...))
# ============================================================

# Agent Identity
agent:
  name: "Nova"
  version: "1.0.0"
  description: "Research & Analysis Agent"

# LLM Model Settings
model:
  provider: "openai"
  name: "gpt-4o"
  temperature: 0.7
  max_tokens: 2048
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0

# Tool Configuration
tools:
  enabled:
    - web_search
    - calculator
    - code_executor
    - file_reader
  settings:
    web_search:
      max_results: 5
      timeout_seconds: 10
    calculator:
      precision: 10
    code_executor:
      sandbox: true
      timeout_seconds: 30

# Memory Configuration
memory:
  database_path: "agent_memory.db"
  conversation_limit: 50
  cache_ttl_seconds: 3600
  knowledge_base_enabled: true

# Logging & Monitoring
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "agent.log"
  rotate_mb: 10

# Retry & Resilience
retry:
  max_attempts: 3
  strategy: "exponential"
  base_delay_seconds: 1.0
  max_delay_seconds: 30.0

# Environment-Specific Overrides
# (Use different config files per environment)
environment: "development"
debug: true
verbose: false
